<!DOCTYPE html>
<html lang="zh-CN" data-theme="sage">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="CardNote">
    <title>CardNote</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        /* ===== CSS Variables - Themes ===== */
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        /* 鼠尾草 Sage */
        [data-theme="sage"] {
            --bg-primary: #F3F5F2;
            --bg-card: #E6EBE4;
            --accent: #8E9E87;
            --accent-light: #B3BEAE;
            --text-primary: #4A5248;
            --text-secondary: #7A8576;
            --border: #D2D9CE;
            --tag-bg: #C5CEBF;
            --btn-bg: #E6EBE4;
            --btn-active: #D2D9CE;
            --shadow: rgba(74, 82, 72, 0.06);
        }

        /* 桉叶 Eucalyptus */
        [data-theme="eucalyptus"] {
            --bg-primary: #F1F4F3;
            --bg-card: #E2E9E6;
            --accent: #7A9B8E;
            --accent-light: #A7BDB3;
            --text-primary: #454F4B;
            --text-secondary: #748A82;
            --border: #CFD9D4;
            --tag-bg: #BACCC5;
            --btn-bg: #E2E9E6;
            --btn-active: #CFD9D4;
            --shadow: rgba(69, 79, 75, 0.06);
        }

        /* 苔藓 Moss */
        [data-theme="moss"] {
            --bg-primary: #F2F3EF;
            --bg-card: #E3E6DE;
            --accent: #7E8E72;
            --accent-light: #ABB6A0;
            --text-primary: #484D43;
            --text-secondary: #767E6E;
            --border: #CED3C7;
            --tag-bg: #BCC4B2;
            --btn-bg: #E3E6DE;
            --btn-active: #CED3C7;
            --shadow: rgba(72, 77, 67, 0.06);
        }

        /* 竹青 Bamboo */
        [data-theme="bamboo"] {
            --bg-primary: #F0F3F1;
            --bg-card: #E0E7E2;
            --accent: #6E9483;
            --accent-light: #9DB8AB;
            --text-primary: #3F4E47;
            --text-secondary: #6B7F75;
            --border: #CBDAD2;
            --tag-bg: #B0C5BA;
            --btn-bg: #E0E7E2;
            --btn-active: #CBDAD2;
            --shadow: rgba(63, 78, 71, 0.06);
        }

        /* 暖棕 Linen（加灰调） */
        [data-theme="linen"] {
            --bg-primary: #F5F3F0;
            --bg-card: #EBE7E3;
            --accent: #A89990;
            --accent-light: #C8BDB6;
            --text-primary: #5C5350;
            --text-secondary: #8A7F7A;
            --border: #D9D2CC;
            --tag-bg: #D4CBC4;
            --btn-bg: #EBE7E3;
            --btn-active: #D9D2CC;
            --shadow: rgba(92, 83, 80, 0.06);
        }

        /* 奶油 Cream（加灰调） */
        [data-theme="cream"] {
            --bg-primary: #F5F4F0;
            --bg-card: #ECEAE3;
            --accent: #B5AD9A;
            --accent-light: #CEC8B8;
            --text-primary: #5A5749;
            --text-secondary: #8A8573;
            --border: #DBD8CE;
            --tag-bg: #D4CFBF;
            --btn-bg: #ECEAE3;
            --btn-active: #DBD8CE;
            --shadow: rgba(90, 87, 73, 0.06);
        }

        /* 兰花紫 Orchid */
        [data-theme="orchid"] {
            --bg-primary: #F4F2F5;
            --bg-card: #E9E5EC;
            --accent: #9C8EA0;
            --accent-light: #BEB4C2;
            --text-primary: #524D55;
            --text-secondary: #847D87;
            --border: #D7D1DA;
            --tag-bg: #CEC6D2;
            --btn-bg: #E9E5EC;
            --btn-active: #D7D1DA;
            --shadow: rgba(82, 77, 85, 0.06);
        }

        /* 柔粉 Soft Red */
        [data-theme="softred"] {
            --bg-primary: #F5F2F2;
            --bg-card: #ECE6E6;
            --accent: #A88E8E;
            --accent-light: #C8B5B5;
            --text-primary: #5C4F4F;
            --text-secondary: #8A7A7A;
            --border: #D9CFCF;
            --tag-bg: #D4C6C6;
            --btn-bg: #ECE6E6;
            --btn-active: #D9CFCF;
            --shadow: rgba(92, 79, 79, 0.06);
        }

        /* 暖橙 Orange */
        [data-theme="orange"] {
            --bg-primary: #F5F3F0;
            --bg-card: #EDEBE5;
            --accent: #B09880;
            --accent-light: #CCBDAA;
            --text-primary: #584E43;
            --text-secondary: #877A6C;
            --border: #DBD5CB;
            --tag-bg: #D1C8BA;
            --btn-bg: #EDEBE5;
            --btn-active: #DBD5CB;
            --shadow: rgba(88, 78, 67, 0.06);
        }

        /* ===== Reset ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bottom);
            transition: background 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        /* ===== Header ===== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-primary);
            padding: 16px 20px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .header-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: none;
            background: var(--btn-bg);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .header-btn:active {
            transform: scale(0.92);
            background: var(--btn-active);
        }

        .header-btn svg {
            width: 20px;
            height: 20px;
        }

        /* ===== Tab Bar ===== */
        .tab-bar {
            display: flex;
            padding: 0 20px;
            gap: 6px;
            margin-bottom: 16px;
        }

        .tab-item {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            background: var(--btn-bg);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-item.active {
            background: var(--accent);
            color: white;
        }

        .tab-item:active {
            transform: scale(0.95);
        }

        /* ===== Cards Container ===== */
        .cards-container {
            padding: 0 16px 100px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ===== Note Card ===== */
        .note-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            border: 1px solid var(--border);
        }

        .note-card:active {
            transform: scale(0.98);
            box-shadow: 0 2px 12px var(--shadow);
        }

        .note-card-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .note-card-content {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .note-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .note-card-tag {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 10px;
            background: var(--tag-bg);
            color: var(--text-secondary);
            font-weight: 500;
        }

        .note-card-date {
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .note-card-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .note-card-actions svg {
            width: 16px;
            height: 16px;
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* ===== Floating Action Button ===== */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: var(--accent);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            cursor: pointer;
            transition: all 0.2s;
            z-index: 90;
            padding-bottom: var(--safe-bottom);
        }

        .fab:active {
            transform: scale(0.9);
        }

        .fab svg {
            width: 26px;
            height: 26px;
        }

        /* ===== Modal / Editor ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.25s;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: var(--bg-primary);
            width: 100%;
            max-height: 90vh;
            border-radius: 24px 24px 0 0;
            padding: 20px 20px calc(20px + var(--safe-bottom));
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            overflow-y: auto;
        }

        .modal-overlay.show .modal {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--btn-bg);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .modal-save {
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-save:active {
            transform: scale(0.95);
        }

        .editor-title {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            outline: none;
            font-family: inherit;
        }

        .editor-title::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .editor-content {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 15px;
            color: var(--text-primary);
            line-height: 1.8;
            min-height: 200px;
            outline: none;
            resize: none;
            font-family: inherit;
        }

        .editor-content::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .editor-tag-row {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .editor-tag-btn {
            padding: 6px 14px;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .editor-tag-btn.active {
            border-color: var(--accent);
            background: var(--accent);
            color: white;
        }

        /* ===== Settings Panel ===== */
        .settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.25s;
        }

        .settings-overlay.show {
            display: flex;
            opacity: 1;
        }

        .settings-panel {
            background: var(--bg-primary);
            width: 100%;
            max-height: 85vh;
            border-radius: 24px 24px 0 0;
            padding: 20px 20px calc(20px + var(--safe-bottom));
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
            overflow-y: auto;
        }

        .settings-overlay.show .settings-panel {
            transform: translateY(0);
        }

        .settings-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 24px;
            text-align: center;
            color: var(--text-primary);
        }

        .settings-section {
            margin-bottom: 24px;
        }

        .settings-section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .theme-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 8px 4px;
            border-radius: 12px;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .theme-option.active {
            border-color: var(--accent);
            background: var(--btn-bg);
        }

        .theme-swatch {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 2px solid rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }

        .theme-swatch::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40%;
            opacity: 0.8;
        }

        .theme-name {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Theme swatches colors */
        .swatch-sage { background: #E6EBE4; }
        .swatch-sage::after { background: #8E9E87; }
        .swatch-eucalyptus { background: #E2E9E6; }
        .swatch-eucalyptus::after { background: #7A9B8E; }
        .swatch-moss { background: #E3E6DE; }
        .swatch-moss::after { background: #7E8E72; }
        .swatch-bamboo { background: #E0E7E2; }
        .swatch-bamboo::after { background: #6E9483; }
        .swatch-linen { background: #EBE7E3; }
        .swatch-linen::after { background: #A89990; }
        .swatch-cream { background: #ECEAE3; }
        .swatch-cream::after { background: #B5AD9A; }
        .swatch-orchid { background: #E9E5EC; }
        .swatch-orchid::after { background: #9C8EA0; }
        .swatch-softred { background: #ECE6E6; }
        .swatch-softred::after { background: #A88E8E; }
        .swatch-orange { background: #EDEBE5; }
        .swatch-orange::after { background: #B09880; }

        /* ===== Search ===== */
        .search-bar {
            margin: 0 20px 16px;
            display: none;
        }

        .search-bar.show {
            display: block;
        }

        .search-input {
            width: 100%;
            padding: 12px 18px;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            background: var(--bg-card);
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* ===== Empty State ===== */
        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 15px;
            opacity: 0.6;
        }

        /* ===== Delete Confirm ===== */
        .delete-confirm {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 28px 24px;
            z-index: 300;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            display: none;
            opacity: 0;
            transition: all 0.25s;
            min-width: 280px;
        }

        .delete-confirm.show {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .delete-confirm p {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .delete-confirm-btns {
            display: flex;
            gap: 12px;
        }

        .delete-cancel-btn {
            flex: 1;
            padding: 12px;
            border-radius: 14px;
            border: none;
            background: var(--btn-bg);
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        .delete-ok-btn {
            flex: 1;
            padding: 12px;
            border-radius: 14px;
            border: none;
            background: #D9645A;
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }

        /* ===== Swipe Delete ===== */
        .note-card-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
        }

        .note-card-delete-bg {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 80px;
            background: #D9645A;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            color: white;
        }

        .note-card-delete-bg svg {
            width: 22px;
            height: 22px;
        }

        /* ===== Animations ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .note-card {
            animation: fadeInUp 0.3s ease both;
        }

        .note-card:nth-child(1) { animation-delay: 0.02s; }
        .note-card:nth-child(2) { animation-delay: 0.04s; }
        .note-card:nth-child(3) { animation-delay: 0.06s; }
        .note-card:nth-child(4) { animation-delay: 0.08s; }
        .note-card:nth-child(5) { animation-delay: 0.1s; }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text-primary);
            color: var(--bg-primary);
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            z-index: 999;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1 class="header-title">CardNote</h1>
        <div class="header-actions">
            <button class="header-btn" id="searchBtn" aria-label="搜索">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
            </button>
            <button class="header-btn" id="settingsBtn" aria-label="设置">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Search -->
    <div class="search-bar" id="searchBar">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索笔记...">
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar" id="tabBar">
        <button class="tab-item active" data-tag="all">全部</button>
        <button class="tab-item" data-tag="日常">日常</button>
        <button class="tab-item" data-tag="工作">工作</button>
        <button class="tab-item" data-tag="灵感">灵感</button>
        <button class="tab-item" data-tag="待办">待办</button>
    </div>

    <!-- Cards -->
    <div class="cards-container" id="cardsContainer">
        <!-- Dynamic content -->
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <p>还没有笔记，点击 + 创建第一篇</p>
    </div>

    <!-- FAB -->
    <button class="fab" id="fabBtn" aria-label="新建笔记">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
    </button>

    <!-- Editor Modal -->
    <div class="modal-overlay" id="editorModal">
        <div class="modal">
            <div class="modal-header">
                <button class="modal-close" id="editorClose">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
                <button class="modal-save" id="editorSave">保存</button>
            </div>
            <input type="text" class="editor-title" id="editorTitle" placeholder="标题">
            <textarea class="editor-content" id="editorContent" placeholder="写点什么..."></textarea>
            <div class="editor-tag-row" id="editorTags">
                <button class="editor-tag-btn" data-tag="日常">日常</button>
                <button class="editor-tag-btn" data-tag="工作">工作</button>
                <button class="editor-tag-btn" data-tag="灵感">灵感</button>
                <button class="editor-tag-btn" data-tag="待办">待办</button>
            </div>
        </div>
    </div>

    <!-- Settings Panel -->
    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-panel">
            <div class="settings-title">设置</div>

            <div class="settings-section">
                <div class="settings-section-title">🌿 绿色系</div>
                <div class="theme-grid">
                    <div class="theme-option" data-theme="sage">
                        <div class="theme-swatch swatch-sage"></div>
                        <span class="theme-name">鼠尾草</span>
                    </div>
                    <div class="theme-option" data-theme="eucalyptus">
                        <div class="theme-swatch swatch-eucalyptus"></div>
                        <span class="theme-name">桉叶</span>
                    </div>
                    <div class="theme-option" data-theme="moss">
                        <div class="theme-swatch swatch-moss"></div>
                        <span class="theme-name">苔藓</span>
                    </div>
                    <div class="theme-option" data-theme="bamboo">
                        <div class="theme-swatch swatch-bamboo"></div>
                        <span class="theme-name">竹青</span>
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <div class="settings-section-title">🍂 暖色系</div>
                <div class="theme-grid">
                    <div class="theme-option" data-theme="linen">
                        <div class="theme-swatch swatch-linen"></div>
                        <span class="theme-name">暖棕</span>
                    </div>
                    <div class="theme-option" data-theme="cream">
                        <div class="theme-swatch swatch-cream"></div>
                        <span class="theme-name">奶油</span>
                    </div>
                    <div class="theme-option" data-theme="orange">
                        <div class="theme-swatch swatch-orange"></div>
                        <span class="theme-name">暖橙</span>
                    </div>
                    <div class="theme-option" data-theme="softred">
                        <div class="theme-swatch swatch-softred"></div>
                        <span class="theme-name">柔粉</span>
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <div class="settings-section-title">💜 冷色系</div>
                <div class="theme-grid">
                    <div class="theme-option" data-theme="orchid">
                        <div class="theme-swatch swatch-orchid"></div>
                        <span class="theme-name">兰花紫</span>
                    </div>
                </div>
            </div>

            <div class="settings-section" style="text-align:center; margin-top:20px;">
                <button class="modal-close" id="settingsClose" style="width:auto; padding:10px 30px; border-radius:14px; font-size:14px;">
                    关闭
                </button>
            </div>
        </div>
    </div>

    <!-- Delete Confirm -->
    <div class="delete-confirm" id="deleteConfirm">
        <p>确定删除这篇笔记吗？</p>
        <div class="delete-confirm-btns">
            <button class="delete-cancel-btn" id="deleteCancel">取消</button>
            <button class="delete-ok-btn" id="deleteOk">删除</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ===== Data Layer =====
        const DB_KEY = 'cardnote_data';
        const THEME_KEY = 'cardnote_theme';

        function loadNotes() {
            try {
                return JSON.parse(localStorage.getItem(DB_KEY)) || [];
            } catch {
                return [];
            }
        }

        function saveNotes(notes) {
            localStorage.setItem(DB_KEY, JSON.stringify(notes));
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2);
        }

        // ===== State =====
        let notes = loadNotes();
        let currentTag = 'all';
        let editingId = null;
        let deleteId = null;

        // ===== DOM =====
        const cardsContainer = document.getElementById('cardsContainer');
        const emptyState = document.getElementById('emptyState');
        const editorModal = document.getElementById('editorModal');
        const editorTitle = document.getElementById('editorTitle');
        const editorContent = document.getElementById('editorContent');
        const editorTags = document.getElementById('editorTags');
        const settingsOverlay = document.getElementById('settingsOverlay');
        const searchBar = document.getElementById('searchBar');
        const searchInput = document.getElementById('searchInput');
        const deleteConfirm = document.getElementById('deleteConfirm');
        const toast = document.getElementById('toast');

        // ===== Init Theme =====
        const savedTheme = localStorage.getItem(THEME_KEY) || 'sage';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateActiveTheme(savedTheme);

        // ===== Render Notes =====
        function renderNotes() {
            const query = searchInput.value.trim().toLowerCase();
            let filtered = notes;

            if (currentTag !== 'all') {
                filtered = filtered.filter(n => n.tag === currentTag);
            }

            if (query) {
                filtered = filtered.filter(n =>
                    n.title.toLowerCase().includes(query) ||
                    n.content.toLowerCase().includes(query)
                );
            }

            // Sort by date descending
            filtered.sort((a, b) => b.updatedAt - a.updatedAt);

            if (filtered.length === 0) {
                cardsContainer.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            cardsContainer.innerHTML = filtered.map(note => `
                <div class="note-card" data-id="${note.id}" onclick="openNote('${note.id}')">
                    <div class="note-card-title">${escapeHtml(note.title || '无标题')}</div>
                    <div class="note-card-content">${escapeHtml(note.content || '')}</div>
                    <div class="note-card-footer">
                        <span class="note-card-tag">#${note.tag || '日常'}</span>
                        <div class="note-card-actions">
                            <span class="note-card-date">${formatDate(note.updatedAt)}</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" onclick="event.stopPropagation();confirmDelete('${note.id}')">
                                <polyline points="3,6 5,6 21,6"/>
                                <path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6M8,6V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2V6"/>
                            </svg>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(ts) {
            const d = new Date(ts);
            const y = d.getFullYear().toString().slice(2);
            const m = (d.getMonth() + 1).toString().padStart(2, '0');
            const day = d.getDate().toString().padStart(2, '0');
            const h = d.getHours().toString().padStart(2, '0');
            const min = d.getMinutes().toString().padStart(2, '0');
            return `${y}/${m}/${day} ${h}:${min}`;
        }

        // ===== Editor =====
        document.getElementById('fabBtn').addEventListener('click', () => {
            editingId = null;
            editorTitle.value = '';
            editorContent.value = '';
            setEditorTag('日常');
            openModal(editorModal);
            setTimeout(() => editorTitle.focus(), 350);
        });

        function openNote(id) {
            const note = notes.find(n => n.id === id);
            if (!note) return;
            editingId = id;
            editorTitle.value = note.title;
            editorContent.value = note.content;
            setEditorTag(note.tag || '日常');
            openModal(editorModal);
        }

        document.getElementById('editorSave').addEventListener('click', () => {
            const title = editorTitle.value.trim();
            const content = editorContent.value.trim();
            if (!title && !content) {
                showToast('请输入内容');
                return;
            }

            const tag = getSelectedTag();
            const now = Date.now();

            if (editingId) {
                const idx = notes.findIndex(n => n.id === editingId);
                if (idx > -1) {
                    notes[idx].title = title;
                    notes[idx].content = content;
                    notes[idx].tag = tag;
                    notes[idx].updatedAt = now;
                }
            } else {
                notes.push({
                    id: generateId(),
                    title,
                    content,
                    tag,
                    createdAt: now,
                    updatedAt: now
                });
            }

            saveNotes(notes);
            closeModal(editorModal);
            renderNotes();
            showToast(editingId ? '已更新' : '已保存');
        });

        document.getElementById('editorClose').addEventListener('click', () => {
            closeModal(editorModal);
        });

        // Tag selection
        editorTags.addEventListener('click', (e) => {
            const btn = e.target.closest('.editor-tag-btn');
            if (!btn) return;
            editorTags.querySelectorAll('.editor-tag-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });

        function setEditorTag(tag) {
            editorTags.querySelectorAll('.editor-tag-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.tag === tag);
            });
        }

        function getSelectedTag() {
            const active = editorTags.querySelector('.editor-tag-btn.active');
            return active ? active.dataset.tag : '日常';
        }

        // ===== Tab Filter =====
        document.getElementById('tabBar').addEventListener('click', (e) => {
            const tab = e.target.closest('.tab-item');
            if (!tab) return;
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentTag = tab.dataset.tag;
            renderNotes();
        });

        // ===== Search =====
        document.getElementById('searchBtn').addEventListener('click', () => {
            searchBar.classList.toggle('show');
            if (searchBar.classList.contains('show')) {
                searchInput.focus();
            } else {
                searchInput.value = '';
                renderNotes();
            }
        });

        searchInput.addEventListener('input', () => {
            renderNotes();
        });

        // ===== Settings =====
        document.getElementById('settingsBtn').addEventListener('click', () => {
            openModal(settingsOverlay);
        });

        document.getElementById('settingsClose').addEventListener('click', () => {
            closeModal(settingsOverlay);
        });

        settingsOverlay.addEventListener('click', (e) => {
            if (e.target === settingsOverlay) closeModal(settingsOverlay);
        });

        // Theme selection
        document.querySelectorAll('.theme-option').forEach(opt => {
            opt.addEventListener('click', () => {
                const theme = opt.dataset.theme;
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem(THEME_KEY, theme);
                updateActiveTheme(theme);
            });
        });

        function updateActiveTheme(theme) {
            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.classList.toggle('active', opt.dataset.theme === theme);
            });
        }

        // ===== Delete =====
        function confirmDelete(id) {
            deleteId = id;
            deleteConfirm.classList.add('show');
        }

        document.getElementById('deleteCancel').addEventListener('click', () => {
            deleteConfirm.classList.remove('show');
            deleteId = null;
        });

        document.getElementById('deleteOk').addEventListener('click', () => {
            if (deleteId) {
                notes = notes.filter(n => n.id !== deleteId);
                saveNotes(notes);
                renderNotes();
                showToast('已删除');
            }
            deleteConfirm.classList.remove('show');
            deleteId = null;
        });

        // ===== Modal Helpers =====
        function openModal(el) {
            el.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(el) {
            el.classList.remove('show');
            document.body.style.overflow = '';
        }

        editorModal.addEventListener('click', (e) => {
            if (e.target === editorModal) closeModal(editorModal);
        });

        // ===== Toast =====
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ===== Demo Data =====
        if (notes.length === 0) {
            const now = Date.now();
            notes = [
                {
                    id: generateId(),
                    title: '冰岛🇮🇸旅行计划',
                    content: '1、一定记得多带些衣服\n2、准备好相机和三脚架\n3、查看极光预报',
                    tag: '日常',
                    createdAt: now - 3600000,
                    updatedAt: now - 3600000
                },
                {
                    id: generateId(),
                    title: 'CardNote开发笔记',
                    content: '1、增加琉璃色盘功能\n2、优化主题切换动画\n3、支持Markdown格式',
                    tag: '工作',
                    createdAt: now - 7200000,
                    updatedAt: now - 7200000
                },
                {
                    id: generateId(),
                    title: '以梦为马',
                    content: '我要做远方的忠诚的儿子，和物质的短暂情人。',
                    tag: '灵感',
                    createdAt: now - 10800000,
                    updatedAt: now - 10800000
                },
                {
                    id: generateId(),
                    title: '学习计划',
                    content: '1、记单词30分钟\n2、阅读英文文章\n3、练习听力',
                    tag: '待办',
                    createdAt: now - 14400000,
                    updatedAt: now - 14400000
                },
                {
                    id: generateId(),
                    title: '每日健身计划',
                    content: '1、每日下午6点打球\n2、晚上做20分钟拉伸\n3、周末跑步5公里',
                    tag: '日常',
                    createdAt: now - 18000000,
                    updatedAt: now - 18000000
                }
            ];
            saveNotes(notes);
        }

        // ===== Initial Render =====
        renderNotes();

        // ===== Service Worker =====
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
